services:
  proxy:
    image: 'jc21/nginx-proxy-manager:2.12.1'
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    network_mode: 'host'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
    volumes:
      - ../nginx/data:/data
      - ../nginx/letsencrypt:/etc/letsencrypt

  certs-init:
    image: kaeltehilfe-certs-init:latest
    platform: linux/amd64
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
    volumes:
      - ../certs/root-crt:/app/output/crt
      - ../certs/root-pfx:/app/output/pfx
    environment:
      PASSWORD: ${ROOT_CERT_PASSWORD}
      EXPORT_CRT_PATH: /app/output/crt/rootCa.crt
      EXPORT_PFX_PATH: /app/output/pfx/rootCa.pfx
      CA_NAME: KaeltehilfeRootCA

  keycloak:
    image: kaeltehilfe-keycloak:latest
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - '127.0.0.1:8080:8080'
    command: start
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    depends_on:
      certs-init:
        condition: service_completed_successfully
    volumes:
      - ../keycloak/themes:/opt/keycloak/providers
      - ../keycloak/data:/opt/keycloak/data
      - ../certs/root-crt:/certs/root
      - ../certs/crl:/opt/keycloak/conf/crl
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      QUARKUS_TRANSACTION_MANAGER_ENABLE_RECOVERY: 'true'
      KC_PROXY_HEADERS: 'xforwarded'
      KC_HTTP_ENABLED: 'true'
      KC_HEALTH_ENABLED: 'true'
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_RELATIVE_PATH: /
      KC_PROXY_ADDRESS_FORWARDING: 'true'
      KC_SPI_X509CERT_LOOKUP_PROVIDER: 'nginx'
      KC_SPI_X509CERT_LOOKUP_NGINX_SSL_CLIENT_CERT: 'X-Client-Cert'
      KC_TRUSTSTORE_PATHS: '/certs/root/rootCa.crt'
      JAVA_OPTS_KC_HEAP: '-Xms256m -Xmx512m'

  keycloak-init:
    image: kaeltehilfe-keycloak-init:latest
    platform: linux/amd64
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      REALM_NAME: ${KC_REALM}
      REALM_REQUIRE_SSL: ALL
      KC_BASE_URL: http://keycloak:8080
      KC_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      APP_URL: https://${APP_DOMAIN}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME}
      APP_ADMIN_FIRSTNAME: ${APP_ADMIN_FIRSTNAME}
      APP_ADMIN_LASTNAME: ${APP_ADMIN_LASTNAME}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD}
      MACHINE_CLIENT_SECRET: ${KC_CLIENT_SECRET}
      USER_CLIENT_ID: ${KC_USER_CLIENT_ID}

  ui:
    image: kaeltehilfe-ui:latest
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - '127.0.0.1:8082:80'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
    depends_on:
      keycloak:
        condition: service_healthy
      keycloak-init:
        condition: service_completed_successfully
    environment:
      API_BASE_URL: https://${APP_DOMAIN}/api
      IDP_AUTHORITY: https://${AUTH_DOMAIN}/realms/${KC_REALM}
      IDP_CLIENT: users
      API_GEO_URL: https://${APP_DOMAIN}/geo

  api:
    image: kaeltehilfe-api:latest
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - '127.0.0.1:8081:8080'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
    depends_on:
      keycloak:
        condition: service_healthy
      certs-init:
        condition: service_completed_successfully
      keycloak-init:
        condition: service_completed_successfully
    volumes:
      - ../kaeltehilfe-api/config/appsettings.json:/App/appsettings.json:ro
      - ../kaeltehilfe-api/db:/opt/kaeltehilfe-api/db
      - ../certs/root-pfx:/opt/kaeltehilfe-api/cert/root
      - ../kaeltehilfe-api/cert/client:/opt/kaeltehilfe-api/cert/client
      - ../certs/crl:/opt/kaeltehilfe-api/cert/crl
    mem_limit: 512m
    environment:
      ASPNETCORE_ENVIRONMENT: 'Production'
      DOTNET_gcServer: '0'
      DOTNET_GCHeapHardLimit: '0x10000000'
      Authorization__Authority: https://${AUTH_DOMAIN}/realms/${KC_REALM}
      Authorization__ClientId: ${KC_USER_CLIENT_ID}  # Keycloak internal UUID, used for admin API calls
      Authorization__ApiBaseUrl: https://${AUTH_DOMAIN}/admin/realms/${KC_REALM}
      Authorization__MachineClientSecret: ${KC_CLIENT_SECRET}
      ALLOWED_ORIGINS: https://${APP_DOMAIN}
      CertificateSettings__RootCertPassword: ${ROOT_CERT_PASSWORD}

  pgosm-db:
    image: postgis/postgis:18-3.6
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    volumes:
      - ../pgosm-db/postgresql:/var/lib/postgresql
    shm_size: '256m'
    environment:
      POSTGRES_USER: ${POSTGIS_ADMIN}
      POSTGRES_PASSWORD: ${POSTGIS_PASSWORD}
      POSTGRES_DB: ${POSTGIS_DB}
      POSTGRES_SHARED_BUFFERS: '256MB'
      POSTGRES_WORK_MEM: '16MB'

  pgosm-init:
    image: pgosm-init:latest
    platform: linux/amd64
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
    depends_on:
      pgosm-db:
        condition: service_healthy
    volumes:
      - ../pgosm-init/input:/app/input
    environment:
      POSTGRES_HOST: pgosm-db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGIS_DB}
      POSTGRES_USER: ${POSTGIS_ADMIN}
      PGUSER: ${POSTGIS_ADMIN}
      POSTGRES_PASSWORD: ${POSTGIS_PASSWORD}
      PGOSM_RAM: 2
      PGOSM_REGION: europe/germany
      PGOSM_SUBREGION: baden-wuerttemberg/tuebingen-regbez
      PGOSM_INPUT_FILE: /app/input/tuebingen-regbez-latest.osm.pbf

  geo:
    image: kaeltehilfe-geo:latest
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "127.0.0.1:8083:8083"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
    depends_on:
      keycloak:
        condition: service_healthy
      keycloak-init:
        condition: service_completed_successfully
      pgosm-db:
        condition: service_healthy
      pgosm-init:
        condition: service_completed_successfully
    environment:
      GOMEMLIMIT: '128MiB'
      LOG_LEVEL: 'info'
      PORT: "8083"
      DB_USER: ${POSTGIS_ADMIN}
      DB_PASSWORD: ${POSTGIS_PASSWORD}
      DB_HOST: pgosm-db
      DB_PORT: "5432"
      DB_NAME: ${POSTGIS_DB}
      ISSUER_URL: https://${AUTH_DOMAIN}/realms/${KC_REALM}
      ALLOWED_ORIGINS: https://${APP_DOMAIN}
