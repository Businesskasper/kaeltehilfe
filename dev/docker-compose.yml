version: '3.8'
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.4
    command: start-dev
    ports:
      - '8050:8080'
      - '8051:9000'
    environment:
      KC_HOSTNAME: 'localhost'
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD}
      QUARKUS_TRANSACTION_MANAGER_ENABLE_RECOVERY: 'true'
      KC_PROXY_HEADERS: 'xforwarded'
      KC_HTTP_ENABLED: 'true'
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_RELATIVE_PATH: /
      KC_PROXY_ADDRESS_FORWARDING: 'true'
      KC_SPI_X509CERT_LOOKUP_PROVIDER: 'nginx'
      KC_SPI_X509CERT_LOOKUP_NGINX_SSL_CLIENT_CERT: 'X-Client-Cert'
      X509_CA_BUNDLE: '/etc/x509/https/rootCert.crt'
    volumes:
        - ./keycloak/data:/opt/keycloak/data
        - ./keycloak/themes:/opt/keycloak/providers
        - ./certs/root-crt:/etc/x509/https
        - ./certs/crl:/crl
    logging:
      driver: "json-file"
      options:
        max-size: "50m"

  pgosm-db:
    image: postgis/postgis:18-3.6
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGIS_ADMIN}
      POSTGRES_PASSWORD: ${POSTGIS_PASSWORD}
      POSTGRES_DB: ${POSTGIS_DB}
    volumes:
      - ./pgosm-db/postgresql:/var/lib/postgresql
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 20

  pgosm-init:
    build: 
      context: ./pgosm-init/image
      dockerfile: Dockerfile
    volumes:
      - ./pgosm-init/input:/app/input
    depends_on:
      pgosm-db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: pgosm-db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGIS_DB}
      POSTGRES_USER: ${POSTGIS_ADMIN}
      PGUSER: ${POSTGIS_ADMIN}
      POSTGRES_PASSWORD: ${POSTGIS_PASSWORD}
      PGOSM_RAM: 8
      PGOSM_REGION: europe
      PGOSM_SUBREGION: germany
      PGOSM_INPUT_FILE: /app/input/germany-latest.osm.pbf
      # PGOSM_REGION: europe/germany
      # PGOSM_SUBREGION: baden-wuerttemberg/tuebingen-regbez
      # PGOSM_INPUT_FILE: /app/input/baden-wuerttemberg/tuebingen-regbez-latest.osm.pbf
    logging:
      driver: "json-file"
      options:
        max-size: "50m"